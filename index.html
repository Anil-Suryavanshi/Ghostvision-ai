<!DOCTYPE html>
<html>
<head>
  <title>GhostVision AI</title>
</head>
<body>

<h1>GhostVision AI </h1>

<textarea id="issue" placeholder="Enter issue"></textarea><br><br>
<textarea id="code" placeholder="Paste code"></textarea><br><br>

<button onclick="fixCode()">Fix Code</button>

<h3>Result:</h3>
<pre id="result"></pre>

<script>
async function fixCode() {
  const issue = document.getElementById("issue").value;
  const code = document.getElementById("code").value;

  const res = await fetch("http://localhost:3000/fix", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ issue, code })
  });

  const data = await res.json();

  document.getElementById("result").innerText =
    "Explanation: " + data.explanation +
    "\n\nFixed Code:\n" + data.fixedCode +
    "\n\nConfidence: " + data.confidence;
}
</script>

</body>
</html>
